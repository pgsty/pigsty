#!/usr/bin/env docker compose
---
#==============================================================#
# File      :   docker-compose.yml
# Desc      :   Hindsight docker compose with external PostgreSQL
# Ctime     :   2026-04-09
# Mtime     :   2026-04-09
# Path      :   app/hindsight/docker-compose.yml
# Docs      :   https://pigsty.io/docs/app/hindsight
# Source    :   https://github.com/vectorize-io/hindsight/blob/main/docker/docker-compose/external-pg/docker-compose.yaml
# License   :   Apache-2.0 @ https://pigsty.io/docs/about/license/
# Copyright :   2018-2026  Ruohang Feng / Vonng (rh@vonng.com)
#==============================================================#

services:
  hindsight:
    image: ghcr.io/vectorize-io/hindsight:${HINDSIGHT_VERSION:-latest}
    container_name: hindsight
    restart: unless-stopped
    env_file:
      - .env
    extra_hosts:
      - host.docker.internal:host-gateway
    ports:
      - '${HINDSIGHT_API_PUBLISH_PORT:-8888}:${HINDSIGHT_API_PORT:-8888}'
      - '${HINDSIGHT_UI_PUBLISH_PORT:-9999}:9999'
    volumes:
      - '${HINDSIGHT_MODEL_CACHE:-/data/hindsight}:/home/hindsight/.cache'
