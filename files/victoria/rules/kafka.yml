groups:
  - name: kafka-rules
    rules:
      # Producer progress: current broker offsets per topic/partition.
      - record: kafka:topic:msg_rate1m
        expr: clamp_min(sum without (partition) (rate(kafka_topic_partition_current_offset[1m])), 0)
      - record: kafka:topic:msg_rate5m
        expr: clamp_min(sum without (partition) (rate(kafka_topic_partition_current_offset[5m])), 0)

      - record: kafka:ins:msg_rate1m
        expr: sum without (topic) (kafka:topic:msg_rate1m)
      - record: kafka:ins:msg_rate5m
        expr: sum without (topic) (kafka:topic:msg_rate5m)

      # Exporters query the cluster, so deduplicate identical exporter views
      # before summing topic rates into the logical Kafka cluster rate.
      - record: kafka:cls:msg_rate1m
        expr: sum by (job, cls) (max without (ins, ip, instance) (kafka:topic:msg_rate1m))
      - record: kafka:cls:msg_rate5m
        expr: sum by (job, cls) (max without (ins, ip, instance) (kafka:topic:msg_rate5m))

      # Consumer progress: committed offsets per group/topic/partition.
      - record: kafka:topic:csg_rate1m
        expr: clamp_min(sum without (partition) (rate(kafka_consumergroup_current_offset[1m])), 0)
      - record: kafka:topic:csg_rate5m
        expr: clamp_min(sum without (partition) (rate(kafka_consumergroup_current_offset[5m])), 0)

      - record: kafka:ins:csg_rate1m
        expr: sum without (topic, consumergroup) (kafka:topic:csg_rate1m)
      - record: kafka:ins:csg_rate5m
        expr: sum without (topic, consumergroup) (kafka:topic:csg_rate5m)

      - record: kafka:cls:csg_rate1m
        expr: sum by (job, cls) (max without (ins, ip, instance) (kafka:topic:csg_rate1m))
      - record: kafka:cls:csg_rate5m
        expr: sum by (job, cls) (max without (ins, ip, instance) (kafka:topic:csg_rate5m))


  ################################################################
  #                         Kafka Alert                          #
  ################################################################
  - name: kafka-alert
    rules:

      #==============================================================#
      #                         Aliveness                            #
      #==============================================================#
      # etcd server instance down
      - alert: KafkaExporterDown
        expr: kafka_exporter_up < 1
        for: 1m
        labels: { level: 0, severity: CRIT, category: kafka }
        annotations:
          summary: "CRIT KafkaExporterDown {{ $labels.ins }}@{{ $labels.instance }}"
          description: |
            kafka_exporter_up[ins={{ $labels.ins }}, instance={{ $labels.instance }}] = {{ $value }} < 1
            /ui/d/kafka-instance?var-ins={{ $labels.ins }}
...
