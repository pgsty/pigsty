---
#-----------------------------------------------------------------
# KAFKA
#-----------------------------------------------------------------
# kafka_cluster:          #CLUSTER  # required cluster identity
# kafka_seq: 1            #INSTANCE # required, unique KRaft node.id
kafka_role: combined      #INSTANCE # combined | broker | controller
# kafka_cluster_id:                 # recovery/adoption only; random on bootstrap

kafka_data: /data/kafka             # required data directory; must be persistent and writable
kafka_heap_opts: '-Xms1G -Xmx1G'
kafka_port: 9092                    # default kafka broker listener port
kafka_controller_port: 9093         # default kraft controller listener port
kafka_parameters: {}
kafka_exporter_port: 9308           # default kafka_exporter port
kafka_jmx_exporter_port: 9404       # default jmx exporter port
kafka_security: plaintext           # plaintext | scram
kafka_users: []
kafka_topics: []

#-----------------------------------------------------------------
# CA (Reference)
#-----------------------------------------------------------------
cert_validity: 7300d                # cert validity, 20 years by default (shared pigsty CA parameter)
...
