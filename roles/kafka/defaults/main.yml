---
# Pigsty Kafka public API. Keep this list deliberately small: bootstrap,
# listener, security, exporter placement, and lifecycle mechanics are owned by
# the role and are not user-tunable implementation details.

# kafka_cluster: kf-main            # required cluster identity
# kafka_seq: 1                      # required, unique KRaft node.id
kafka_role: combined                # combined | broker | controller
# kafka_cluster_id:                 # recovery/adoption only; random on bootstrap

kafka_data: /data/kafka
kafka_heap_opts: -Xms1G -Xmx1G
kafka_port: 9092
kafka_controller_port: 9095         # 9093 is reserved by Pigsty AlertManager
# kafka_rack: rack-a                # all broker-capable nodes or none
kafka_parameters: {}

kafka_jmx_exporter_enabled: true
kafka_jmx_exporter_port: 9404
kafka_exporter_port: 9308

kafka_security: plaintext           # plaintext | scram
kafka_users: []
kafka_topics: []
...
