---
- name: skip converge when the healthy-cluster predicate selected rolling
  when: kafka_lifecycle_internal != 'converge'
  meta: end_host

- name: start controller-capable Kafka services for quorum convergence
  when:
    - kafka_has_controller | bool
    - not ansible_check_mode
  systemd:
    name: kafka
    state: started
    enabled: true
    daemon_reload: true

- name: wait for every controller listener
  when:
    - kafka_has_controller | bool
    - not ansible_check_mode
  wait_for:
    host: "{{ inventory_hostname }}"
    port: "{{ kafka_controller_port }}"
    state: started
    timeout: 120

- name: wait for dynamic controller quorum convergence
  run_once: true
  when: not ansible_check_mode
  delegate_to: "{{ kafka_initial_admin_host_internal }}"
  become_user: kafka
  command:
    argv:
      - /opt/kafka/bin/kafka-metadata-quorum.sh
      - --bootstrap-controller
      - "{{ kafka_controller_bootstrap_internal }}"
      - --command-config
      - /etc/kafka/controller.properties
      - describe
      - --status
  register: kafka_controller_converge_internal
  changed_when: false
  retries: 30
  delay: 4
  until:
    - kafka_controller_converge_internal.rc == 0
    - "'LeaderId:' in kafka_controller_converge_internal.stdout"

- name: verify frozen initial controller directory identities
  run_once: true
  when: not ansible_check_mode
  assert:
    that: item.directory_id in kafka_controller_converge_internal.stdout
    fail_msg: >-
      Controller node.id {{ item.node_id }} directory identity is absent from
      the live quorum. Use explicit remove-controller/add-controller recovery.
  loop: "{{ kafka_manifest_internal.initial_controllers }}"

- name: start pure broker services after controller quorum convergence
  when:
    - kafka_role == 'broker'
    - not ansible_check_mode
  systemd:
    name: kafka
    state: started
    enabled: true
    daemon_reload: true

- name: wait for broker listener after converge
  when:
    - kafka_has_broker | bool
    - not ansible_check_mode
  wait_for:
    host: "{{ inventory_hostname }}"
    port: "{{ kafka_port }}"
    state: started
    timeout: 180

- name: require full cluster health after converge
  run_once: true
  when: not ansible_check_mode
  delegate_to: "{{ kafka_admin_host_internal }}"
  become_user: kafka
  command:
    argv:
      - /usr/local/bin/pigsty-kafka-health
      - cluster
      - --bootstrap-server
      - "{{ kafka_admin_host_internal }}:{{ hostvars[kafka_admin_host_internal].kafka_port | default(9092) }}"
      - --command-config
      - /etc/kafka/admin.properties
  register: kafka_converge_health_internal
  changed_when: false
  retries: 45
  delay: 4
  until: kafka_converge_health_internal.rc == 0

- name: record static Kafka state loaded by a service started during converge
  when:
    - not ansible_check_mode
    - kafka_service_active_internal.rc != 0
  copy:
    dest: /etc/kafka/.pigsty-applied-static.sha256
    content: "{{ kafka_desired_static_fingerprint_internal }}\n"
    owner: root
    group: root
    mode: '0644'

- name: clear pending restart state already loaded during converge
  when:
    - not ansible_check_mode
    - kafka_service_active_internal.rc != 0
  set_fact:
    kafka_restart_required_internal: false

- name: continue pending static convergence through strict rolling
  when: not ansible_check_mode
  set_fact:
    kafka_lifecycle_internal: rolling
...
