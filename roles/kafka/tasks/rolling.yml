---
- name: skip rolling when the cluster was not healthy before preparation
  when: >-
    kafka_lifecycle_internal != 'rolling' or
    kafka_broker_admission_required_internal | default(false) | bool
  meta: end_host

- name: derive a surviving broker for lifecycle gates
  set_fact:
    kafka_gate_host_internal: >-
      {{ (kafka_broker_nodes | rejectattr('host', 'equalto', inventory_hostname)
          | map(attribute='host') | list | first)
         | default(kafka_admin_host_internal, true) }}

- name: preflight target removal against quorum and effective topic minISR
  when:
    - kafka_restart_required_internal | bool
    - not ansible_check_mode
  delegate_to: "{{ kafka_gate_host_internal | default(inventory_hostname) }}"
  become_user: kafka
  command:
    argv: >-
      {{ ['/usr/local/bin/pigsty-kafka-health', 'pre',
          '--bootstrap-server', kafka_gate_host_internal ~ ':' ~
             (hostvars[kafka_gate_host_internal].kafka_port | default(9092) | string),
          '--command-config', '/etc/kafka/admin.properties',
          '--node-id', kafka_seq | string] +
         (['--controller'] if kafka_has_controller | bool else []) +
         (['--broker'] if kafka_has_broker | bool else []) }}
  register: kafka_pre_roll_health_internal
  changed_when: false

- name: restart exactly one Kafka node after its preflight gate
  when:
    - kafka_restart_required_internal | bool
    - not ansible_check_mode
  systemd:
    name: kafka
    state: restarted
    enabled: true
    daemon_reload: true

- name: wait for the restarted Kafka listener
  when:
    - kafka_restart_required_internal | bool
    - not ansible_check_mode
  wait_for:
    host: "{{ inventory_hostname }}"
    port: "{{ kafka_port if kafka_has_broker | bool else kafka_controller_port }}"
    state: started
    timeout: 180

- name: require target catch-up and full health before the next node
  when:
    - kafka_restart_required_internal | bool
    - not ansible_check_mode
  delegate_to: "{{ kafka_gate_host_internal | default(inventory_hostname) }}"
  become_user: kafka
  command:
    argv: >-
      {{ ['/usr/local/bin/pigsty-kafka-health', 'post',
          '--bootstrap-server', kafka_gate_host_internal ~ ':' ~
             (hostvars[kafka_gate_host_internal].kafka_port | default(9092) | string),
          '--command-config', '/etc/kafka/admin.properties',
          '--node-id', kafka_seq | string] +
         (['--controller'] if kafka_has_controller | bool else []) +
         (['--broker'] if kafka_has_broker | bool else []) }}
  register: kafka_post_roll_health_internal
  changed_when: false
  retries: 45
  delay: 4
  until: kafka_post_roll_health_internal.rc == 0

- name: record static Kafka state proven live by strict rolling
  when:
    - kafka_restart_required_internal | bool
    - not ansible_check_mode
  copy:
    dest: /etc/kafka/.pigsty-applied-static.sha256
    content: "{{ kafka_desired_static_fingerprint_internal }}\n"
    owner: root
    group: root
    mode: '0644'
...
