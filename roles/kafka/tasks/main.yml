---
# The playbook invokes this role in explicit phases.  Keeping the dispatcher
# here also makes each phase independently taggable and testable.
- import_tasks: identity.yml
  tags: [always, kafka-id]

- include_tasks:
    file: clean.yml
    apply:
      tags: [never, kafka_clean]
  when: kafka_phase | default('prepare') == 'prepare'
  tags: [never, kafka_clean]

- include_tasks: prepare.yml
  when: kafka_phase | default('prepare') == 'prepare'
  tags: [kafka, kafka_prepare, kafka_pkg, kafka_config, kafka_boot]

- include_tasks: converge.yml
  when: kafka_phase | default('prepare') == 'converge'
  tags: [kafka, kafka_converge, kafka_launch]

- include_tasks: admission.yml
  when: kafka_phase | default('prepare') == 'admission'
  tags: [kafka, kafka_admission, kafka_launch]

- include_tasks: rolling.yml
  when: kafka_phase | default('prepare') == 'rolling'
  tags: [kafka, kafka_rolling, kafka_launch]

- include_tasks: finalize.yml
  when: kafka_phase | default('prepare') == 'finalize'
  tags: [kafka, kafka_finalize, kafka_resource, kafka_exporter, kafka_register]
...
