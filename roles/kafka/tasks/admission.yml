---
- name: skip broker admission outside healthy-cluster expansion
  when: >-
    kafka_lifecycle_internal != 'rolling' or
    not (kafka_broker_admission_required_internal | default(false) | bool) or
    kafka_role != 'broker'
  meta: end_host

- name: start exactly one newly formatted pure broker
  when: not ansible_check_mode
  systemd:
    name: kafka
    state: started
    enabled: true
    daemon_reload: true

- name: wait for the admitted broker listener
  when: not ansible_check_mode
  wait_for:
    host: "{{ inventory_hostname }}"
    port: "{{ kafka_port }}"
    state: started
    timeout: 180

- name: require broker registration and full health before the next admission
  when: not ansible_check_mode
  delegate_to: "{{ kafka_admin_host_internal }}"
  become_user: kafka
  command:
    argv:
      - /usr/local/bin/pigsty-kafka-health
      - post
      - --bootstrap-server
      - "{{ kafka_admin_host_internal }}:{{ hostvars[kafka_admin_host_internal].kafka_port | default(9092) }}"
      - --command-config
      - /etc/kafka/admin.properties
      - --node-id
      - "{{ kafka_seq }}"
      - --broker
  register: kafka_post_admission_health_internal
  changed_when: false
  retries: 45
  delay: 4
  until: kafka_post_admission_health_internal.rc == 0

- name: record static Kafka state proven live by broker admission
  when: not ansible_check_mode
  copy:
    dest: /etc/kafka/.pigsty-applied-static.sha256
    content: "{{ kafka_desired_static_fingerprint_internal }}\n"
    owner: root
    group: root
    mode: '0644'
