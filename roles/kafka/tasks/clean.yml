---
- name: require exact confirmation for destructive Kafka cleanup
  assert:
    that:
      - kafka_clean | default(false) | bool
      - kafka_clean_confirm | default('') == kafka_cluster
      - kafka_data.startswith('/')
      - kafka_data | length >= 8
      - kafka_data not in ['/', '/data', '/var', '/etc', '/opt', '/usr', '/home', '/root', '/pg']
    fail_msg: >-
      Refusing Kafka cleanup. Use --tags kafka_clean -e kafka_clean=true
      -e kafka_clean_confirm={{ kafka_cluster }} with an exact full-cluster -l limit.

- name: stop Kafka services before cleanup
  systemd:
    name: "{{ item }}"
    state: stopped
    enabled: false
    daemon_reload: true
  failed_when: false
  loop: [kafka_exporter, kafka]

- name: remove confirmed Kafka data and node-local security state
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - "{{ kafka_data }}"
    - /etc/kafka/pki
    - /etc/kafka_exporter
    - /etc/kafka/exporter-ca.crt
    - /etc/kafka/admin.properties
    - /etc/kafka/controller.properties
    - /etc/kafka/.pigsty-applied-static.sha256
    - /etc/kafka/.pigsty-user-digests.json

- name: remove confirmed Kafka monitoring targets
  delegate_to: "{{ item.0 }}"
  loop: >-
    {{ (groups['infra'] | default([])) |
       product(['kafka', 'kafka_exporter']) | list }}
  file:
    path: "/infra/targets/{{ item.1 }}/{{ kafka_instance }}.yml"
    state: absent

- name: remove cluster bootstrap manifest and internal secrets
  run_once: true
  become: false
  delegate_to: localhost
  file:
    path: "{{ kafka_manifest_dir_internal }}"
    state: absent
...
