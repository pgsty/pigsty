---
- name: validate declarative Kafka resource collections
  run_once: true
  assert:
    that:
      - kafka_users | map(attribute='name') | list | unique | length == kafka_users | length
      - kafka_topics | map(attribute='name') | list | unique | length == kafka_topics | length
      - kafka_security == 'scram' or kafka_users | length == 0
    fail_msg: Kafka users require scram mode, and user/topic names must be unique

- name: validate Kafka user schema
  run_once: true
  no_log: true
  assert:
    that:
      - item is mapping
      - item.keys() | difference(['name', 'password', 'acls', 'quota']) | length == 0
      - item.name is string and item.name | length > 0
      - item.password is defined and item.password is string and item.password | length >= 12
      - item.acls | default([]) is sequence
      - item.quota | default({}) is mapping
      - item.quota | default({}) | dict2items | map(attribute='key') | difference(['producer_byte_rate', 'consumer_byte_rate', 'request_percentage', 'controller_mutation_rate']) | length == 0
  loop: "{{ kafka_users }}"

- name: validate Kafka ACL schema
  run_once: true
  no_log: true
  assert:
    that:
      - item.1 is mapping
      - item.1.keys() | difference(['resource', 'name', 'pattern', 'operations']) | length == 0
      - item.1.resource in ['topic', 'group', 'transactional_id', 'cluster']
      - item.1.name is defined
      - item.1.pattern | default('literal') in ['literal', 'prefixed']
      - item.1.operations is sequence
      - item.1.operations | difference(['Read', 'Write', 'Create', 'Delete', 'Alter', 'Describe', 'ClusterAction', 'DescribeConfigs', 'AlterConfigs', 'IdempotentWrite']) | length == 0
  loop: "{{ query('subelements', kafka_users, 'acls', {'skip_missing': true}) }}"
  loop_control:
    label: "{{ item.0.name }} ACL {{ item.1.resource }}:{{ item.1.name }}"

- name: validate Kafka topic schema
  run_once: true
  assert:
    that:
      - item is mapping
      - item.keys() | difference(['name', 'partitions', 'replication_factor', 'config']) | length == 0
      - item.name is string and item.name | length > 0
      - item.partitions | int >= 1
      - item.replication_factor | int >= 1
      - item.replication_factor | int <= kafka_broker_nodes | length
      - item.config | default({}) is mapping
    fail_msg: Invalid topic schema or replication factor exceeds current broker count
  loop: "{{ kafka_topics }}"

- name: install the role-owned Kafka resource reconciler
  copy:
    src: kafka_resources.py
    dest: /usr/local/bin/pigsty-kafka-resources
    owner: root
    group: root
    mode: '0755'

- name: build resource reconciliation specification
  run_once: true
  no_log: true
  set_fact:
    kafka_resource_spec_internal:
      min_insync_replicas: "{{ kafka_manifest_internal.min_insync_replicas | int }}"
      users: >-
        {{ kafka_users +
           ([{'name': kafka_monitor_principal_internal,
              'acls': [
                {'resource': 'cluster', 'name': 'kafka-cluster', 'pattern': 'literal', 'operations': ['Describe']},
                {'resource': 'topic', 'name': '*', 'pattern': 'literal', 'operations': ['Describe']},
                {'resource': 'group', 'name': '*', 'pattern': 'literal', 'operations': ['Describe']}]}]
            if kafka_security == 'scram' else []) }}
      topics: "{{ kafka_topics }}"

- name: converge dynamic cluster configuration and declared resources
  run_once: true
  when: not ansible_check_mode
  delegate_to: "{{ kafka_admin_host_internal }}"
  block:
    - name: stage transient resource specification
      no_log: true
      copy:
        dest: /run/pigsty-kafka-resources.json
        content: "{{ kafka_resource_spec_internal | to_json }}"
        owner: kafka
        group: kafka
        mode: '0600'
      changed_when: false
    - name: reconcile Kafka resources against live metadata
      become_user: kafka
      no_log: "{{ kafka_users | length > 0 }}"
      command:
        argv:
          - /usr/local/bin/pigsty-kafka-resources
          - /run/pigsty-kafka-resources.json
          - "{{ kafka_admin_host_internal }}:{{ hostvars[kafka_admin_host_internal].kafka_port | default(9092) }}"
          - /etc/kafka/admin.properties
      register: kafka_resource_result_internal
      failed_when: false
      changed_when: >-
        kafka_resource_result_internal.rc == 0 and
        (kafka_resource_result_internal.stdout | from_json).changed | length > 0
    - name: require successful Kafka resource convergence
      assert:
        that: kafka_resource_result_internal.rc == 0
        fail_msg: >-
          Kafka resource convergence failed safely:
          {{ ((kafka_resource_result_internal.stdout | default('{}') | from_json).error
              | default('resource helper returned no diagnostic')) }}
    - name: report non-secret Kafka resource changes
      vars:
        kafka_resource_changes_internal: >-
          {{ (kafka_resource_result_internal.stdout | from_json).changed }}
      when: kafka_resource_changes_internal | length > 0
      debug:
        msg: "Kafka resource changes: {{ kafka_resource_changes_internal | join(', ') }}"
  always:
    - name: remove transient resource specification
      file:
        path: /run/pigsty-kafka-resources.json
        state: absent
      changed_when: false

- name: inspect frozen internal topic replication
  run_once: true
  when: not ansible_check_mode
  delegate_to: "{{ kafka_admin_host_internal }}"
  become_user: kafka
  command:
    argv:
      - /opt/kafka/bin/kafka-topics.sh
      - --bootstrap-server
      - "{{ kafka_admin_host_internal }}:{{ hostvars[kafka_admin_host_internal].kafka_port | default(9092) }}"
      - --command-config
      - /etc/kafka/admin.properties
      - --describe
      - --topic
      - __consumer_offsets
  register: kafka_internal_topic_internal
  changed_when: false
  failed_when: false

- name: report internal topic replication drift without unsafe reassignment
  run_once: true
  when: >-
    not ansible_check_mode and
    kafka_internal_topic_internal.rc | default(1) == 0 and
    ('ReplicationFactor: ' ~ (kafka_manifest_internal.replication_factor | string))
    not in kafka_internal_topic_internal.stdout
  debug:
    msg: >-
      __consumer_offsets replication differs from frozen bootstrap RF
      {{ kafka_manifest_internal.replication_factor }}. The role will not claim
      an RF upgrade or perform automatic reassignment; use an explicit reviewed plan.
...
