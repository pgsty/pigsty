---
- name: inspect role-owned Kafka secret material
  run_once: true
  become: false
  delegate_to: localhost
  stat:
    path: "{{ kafka_secret_file_internal }}"
  register: kafka_secret_stat_internal

- name: reject missing secrets for formatted SCRAM storage
  when:
    - kafka_security == 'scram'
    - kafka_formatted_flags_internal | select('equalto', true) | list | length > 0
    - not kafka_secret_stat_internal.stat.exists
  fail:
    msg: >-
      Formatted SCRAM cluster {{ kafka_cluster }} has no role-owned secret file
      {{ kafka_secret_file_internal }}. Refusing to rotate or invent identities.

- name: generate internal SCRAM and keystore secrets for a new secure cluster
  when:
    - kafka_security == 'scram'
    - not kafka_secret_stat_internal.stat.exists
    - not ansible_check_mode
  run_once: true
  delegate_to: "{{ kafka_initial_admin_host_internal }}"
  become_user: kafka
  command: /opt/kafka/bin/kafka-storage.sh random-uuid
  loop:
    - admin_password
    - monitor_password
    - broker_a_password
    - broker_b_password
    - keystore_password
    - truststore_password
  register: kafka_new_secrets_internal
  changed_when: false
  no_log: true

- name: build new internal secret material in memory
  when:
    - kafka_security == 'scram'
    - not kafka_secret_stat_internal.stat.exists
  no_log: true
  set_fact:
    kafka_secrets_internal:
      schema: 1
      admin_principal: pigsty-admin
      admin_password: "{{ 'check-admin-password' if ansible_check_mode else kafka_new_secrets_internal.results[0].stdout }}"
      monitor_principal: pigsty-monitor
      monitor_password: "{{ 'check-monitor-password' if ansible_check_mode else kafka_new_secrets_internal.results[1].stdout }}"
      broker_active: a
      broker_a_principal: pigsty-broker-a
      broker_a_password: "{{ 'check-broker-a-password' if ansible_check_mode else kafka_new_secrets_internal.results[2].stdout }}"
      broker_b_principal: pigsty-broker-b
      broker_b_password: "{{ 'check-broker-b-password' if ansible_check_mode else kafka_new_secrets_internal.results[3].stdout }}"
      keystore_password: "{{ 'check-keystore-password' if ansible_check_mode else kafka_new_secrets_internal.results[4].stdout }}"
      truststore_password: "{{ 'check-truststore-password' if ansible_check_mode else kafka_new_secrets_internal.results[5].stdout }}"

- name: persist new internal secret material
  when:
    - kafka_security == 'scram'
    - not kafka_secret_stat_internal.stat.exists
    - not ansible_check_mode
  run_once: true
  become: false
  delegate_to: localhost
  no_log: true
  copy:
    dest: "{{ kafka_secret_file_internal }}"
    content: "{{ kafka_secrets_internal | to_nice_yaml(indent=2, sort_keys=false) }}"
    mode: '0600'

- name: read existing internal secret material
  when:
    - kafka_security == 'scram'
    - kafka_secret_stat_internal.stat.exists
  run_once: true
  become: false
  delegate_to: localhost
  no_log: true
  slurp:
    src: "{{ kafka_secret_file_internal }}"
  register: kafka_secret_raw_internal

- name: load existing internal secret material
  when:
    - kafka_security == 'scram'
    - kafka_secret_stat_internal.stat.exists
  no_log: true
  set_fact:
    kafka_secrets_internal: "{{ kafka_secret_raw_internal.content | b64decode | from_yaml }}"

- name: validate protected Kafka security rotation request
  when: >-
    kafka_rotate_credentials | default(false) | bool or
    kafka_rotate_certificates | default(false) | bool
  run_once: true
  assert:
    that:
      - kafka_security == 'scram'
      - kafka_rotate_confirm | default('') == kafka_cluster
      - not (kafka_rotate_credentials | default(false) | bool and
             kafka_rotate_certificates | default(false) | bool)
      - kafka_secret_stat_internal.stat.exists
      - kafka_formatted_flags_internal | select('equalto', true) | list | length == kafka_cluster_members | length
    fail_msg: >-
      Security rotation is a protected, one-action-at-a-time workflow for an
      existing SCRAM cluster. Select every cluster member with -l, set exactly
      one of kafka_rotate_credentials or kafka_rotate_certificates, and pass
      kafka_rotate_confirm={{ kafka_cluster }}.

- name: require a healthy cluster before security rotation
  when:
    - not ansible_check_mode
    - kafka_rotate_credentials | default(false) | bool or kafka_rotate_certificates | default(false) | bool
  run_once: true
  delegate_to: "{{ kafka_admin_host_internal }}"
  become_user: kafka
  command:
    argv:
      - /usr/local/bin/pigsty-kafka-health
      - cluster
      - --bootstrap-server
      - "{{ kafka_admin_host_internal }}:{{ hostvars[kafka_admin_host_internal].kafka_port | default(9092) }}"
      - --command-config
      - /etc/kafka/admin.properties
  changed_when: false

- name: report planned security rotation in check mode
  when:
    - ansible_check_mode
    - kafka_rotate_credentials | default(false) | bool or kafka_rotate_certificates | default(false) | bool
  run_once: true
  debug:
    msg: >-
      Validated protected {{ 'credential' if kafka_rotate_credentials | default(false) | bool
      else 'certificate' }} rotation for {{ kafka_cluster }}; no secret or PKI
      material is changed in check mode.
  changed_when: true

- name: derive inactive inter-broker credential slot
  when: kafka_rotate_credentials | default(false) | bool
  no_log: true
  set_fact:
    kafka_rotation_standby_slot_internal: >-
      {{ 'b' if kafka_secrets_internal.broker_active == 'a' else 'a' }}
    kafka_rotation_standby_principal_internal: >-
      {{ kafka_secrets_internal['broker_' ~
         ('b' if kafka_secrets_internal.broker_active == 'a' else 'a') ~ '_principal'] }}
    kafka_rotation_standby_password_key_internal: >-
      {{ 'broker_' ~ ('b' if kafka_secrets_internal.broker_active == 'a' else 'a') ~ '_password' }}

- name: generate a replacement inactive inter-broker credential
  when:
    - kafka_rotate_credentials | default(false) | bool
    - not ansible_check_mode
  run_once: true
  delegate_to: "{{ kafka_admin_host_internal }}"
  become_user: kafka
  command: /opt/kafka/bin/kafka-storage.sh random-uuid
  register: kafka_rotated_broker_secret_internal
  changed_when: false
  no_log: true

- name: install replacement credential before switching broker identity
  when:
    - kafka_rotate_credentials | default(false) | bool
    - not ansible_check_mode
  run_once: true
  delegate_to: "{{ kafka_admin_host_internal }}"
  become_user: kafka
  no_log: true
  command:
    argv:
      - /opt/kafka/bin/kafka-configs.sh
      - --bootstrap-server
      - "{{ kafka_admin_host_internal }}:{{ hostvars[kafka_admin_host_internal].kafka_port | default(9092) }}"
      - --command-config
      - /etc/kafka/admin.properties
      - --entity-type
      - users
      - --entity-name
      - "{{ kafka_rotation_standby_principal_internal }}"
      - --alter
      - --add-config
      - >-
        SCRAM-SHA-512=[iterations=8192,password={{ kafka_rotated_broker_secret_internal.stdout }}]

- name: switch to the prepared inter-broker credential slot
  when:
    - kafka_rotate_credentials | default(false) | bool
    - not ansible_check_mode
  no_log: true
  set_fact:
    kafka_secrets_internal: >-
      {{ kafka_secrets_internal | combine({
           'broker_active': kafka_rotation_standby_slot_internal,
           kafka_rotation_standby_password_key_internal:
             kafka_rotated_broker_secret_internal.stdout
         }) }}
    kafka_credentials_rotated_internal: true

- name: persist switched inter-broker credential slot
  when:
    - kafka_rotate_credentials | default(false) | bool
    - not ansible_check_mode
  run_once: true
  become: false
  delegate_to: localhost
  no_log: true
  copy:
    dest: "{{ kafka_secret_file_internal }}"
    content: "{{ kafka_secrets_internal | to_nice_yaml(indent=2, sort_keys=false) }}"
    mode: '0600'

- name: derive role-owned Kafka security identities
  no_log: true
  set_fact:
    kafka_admin_principal_internal: >-
      {{ kafka_secrets_internal.admin_principal if kafka_security == 'scram' else '' }}
    kafka_admin_password_internal: >-
      {{ kafka_secrets_internal.admin_password if kafka_security == 'scram' else '' }}
    kafka_monitor_principal_internal: >-
      {{ kafka_secrets_internal.monitor_principal if kafka_security == 'scram' else '' }}
    kafka_monitor_password_internal: >-
      {{ kafka_secrets_internal.monitor_password if kafka_security == 'scram' else '' }}
    kafka_broker_principal_internal: >-
      {{ kafka_secrets_internal['broker_' ~ kafka_secrets_internal.broker_active ~ '_principal']
         if kafka_security == 'scram' else '' }}
    kafka_broker_password_internal: >-
      {{ kafka_secrets_internal['broker_' ~ kafka_secrets_internal.broker_active ~ '_password']
         if kafka_security == 'scram' else '' }}
    kafka_broker_standby_principal_internal: >-
      {{ kafka_secrets_internal['broker_' ~ ('b' if kafka_secrets_internal.broker_active == 'a' else 'a') ~ '_principal']
         if kafka_security == 'scram' else '' }}
    kafka_broker_standby_password_internal: >-
      {{ kafka_secrets_internal['broker_' ~ ('b' if kafka_secrets_internal.broker_active == 'a' else 'a') ~ '_password']
         if kafka_security == 'scram' else '' }}
    kafka_keystore_password_internal: >-
      {{ kafka_secrets_internal.keystore_password if kafka_security == 'scram' else '' }}
    kafka_truststore_password_internal: >-
      {{ kafka_secrets_internal.truststore_password if kafka_security == 'scram' else '' }}

- name: validate internal Kafka secret schema
  when: kafka_security == 'scram'
  no_log: true
  assert:
    that:
      - kafka_secrets_internal.schema | int == 1
      - kafka_secrets_internal.broker_active in ['a', 'b']
      - kafka_admin_password_internal | length >= 16
      - kafka_monitor_password_internal | length >= 16
      - kafka_broker_password_internal | length >= 16
      - kafka_broker_standby_password_internal | length >= 16

- name: resolve canonical TLS endpoint aliases
  when: kafka_security == 'scram'
  command:
    argv:
      - getent
      - hosts
      - "{{ inventory_hostname }}"
  register: kafka_tls_host_lookup_internal
  changed_when: false
  failed_when: false
  check_mode: false

- name: derive routable certificate subject alternatives
  when: kafka_security == 'scram'
  set_fact:
    kafka_tls_sans_internal: >-
      {%- set sans = ['DNS:localhost', 'IP:127.0.0.1'] -%}
      {%- if inventory_hostname is regex('^[0-9.]+$') -%}
      {%-   set _ = sans.append('IP:' ~ inventory_hostname) -%}
      {%- else -%}
      {%-   set _ = sans.append('DNS:' ~ inventory_hostname) -%}
      {%- endif -%}
      {%- for alias in (kafka_tls_host_lookup_internal.stdout | default('')).split() -%}
      {%-   if not (alias is regex('^[0-9.]+$')) -%}
      {%-     set _ = sans.append('DNS:' ~ alias) -%}
      {%-   endif -%}
      {%- endfor -%}
      {%- if nodename | default('') | length > 0 -%}
      {%-   set _ = sans.append('DNS:' ~ nodename) -%}
      {%- endif -%}
      {{ sans | unique | sort }}

- name: derive the certificate generation workspace
  when: kafka_security == 'scram'
  set_fact:
    kafka_certificate_workspace_internal: >-
      {{ kafka_manifest_dir_internal }}/pki{{ '/.rotation'
         if kafka_rotate_certificates | default(false) | bool else '' }}

- name: clear only the staging workspace for protected certificate rotation
  when:
    - kafka_security == 'scram'
    - kafka_rotate_certificates | default(false) | bool
  run_once: true
  become: false
  delegate_to: localhost
  file:
    path: "{{ kafka_certificate_workspace_internal }}"
    state: absent

- name: ensure controller-side certificate workspace
  when: kafka_security == 'scram'
  run_once: true
  become: false
  delegate_to: localhost
  file:
    path: "{{ kafka_manifest_dir_internal }}/pki"
    state: directory
    mode: '0700'

- name: ensure isolated certificate rotation staging workspace
  when:
    - kafka_security == 'scram'
    - kafka_rotate_certificates | default(false) | bool
  run_once: true
  become: false
  delegate_to: localhost
  file:
    path: "{{ kafka_certificate_workspace_internal }}"
    state: directory
    mode: '0700'

- name: inspect node UTC time before certificate generation
  when: kafka_security == 'scram'
  command:
    argv: [date, -u, +%s]
  register: kafka_certificate_node_time_internal
  changed_when: false
  check_mode: false

- name: inspect controller UTC time before certificate generation
  when: kafka_security == 'scram'
  run_once: true
  become: false
  delegate_to: localhost
  command:
    argv: [date, -u, +%s]
  register: kafka_certificate_controller_time_internal
  changed_when: false
  check_mode: false

- name: require synchronized clocks before replacing active certificates
  when: kafka_security == 'scram'
  run_once: true
  become: false
  delegate_to: localhost
  assert:
    that:
      - >-
        ((hostvars[item].kafka_certificate_node_time_internal.stdout | int) -
         (kafka_certificate_controller_time_internal.stdout | int)) | abs <= 30
    fail_msg: >-
      Kafka certificate generation requires controller and node UTC clocks to
      differ by no more than 30 seconds. Synchronize NTP on {{ item }} before
      retrying; active certificates have not been replaced.
  loop: "{{ kafka_cluster_members }}"

- name: persist the desired certificate endpoint specification
  when:
    - kafka_security == 'scram'
    - not ansible_check_mode or kafka_secret_stat_internal.stat.exists
  run_once: true
  become: false
  delegate_to: localhost
  copy:
    dest: "{{ kafka_manifest_dir_internal }}/pki/{{ item | regex_replace('[^A-Za-z0-9_.-]', '_') }}.spec"
    content: |
      schema=1
      sans={{ hostvars[item].kafka_tls_sans_internal | join(',') }}
      ca={{ lookup('file', role_path + '/../../files/pki/ca/ca.crt') | hash('sha256') }}
    mode: '0600'
  loop: "{{ kafka_cluster_members }}"
  register: kafka_certificate_spec_internal
  no_log: true

- name: invalidate certificates whose endpoint specification changed
  when:
    - kafka_security == 'scram'
    - not ansible_check_mode or kafka_secret_stat_internal.stat.exists
    - not kafka_rotate_certificates | default(false) | bool
  run_once: true
  become: false
  delegate_to: localhost
  file:
    path: "{{ kafka_manifest_dir_internal }}/pki/{{ item.0 | regex_replace('[^A-Za-z0-9_.-]', '_') }}.{{ item.1 }}"
    state: absent
  loop: >-
    {{ (kafka_certificate_spec_internal.results | default([])
        | selectattr('changed') | map(attribute='item') | list)
       | product(['key', 'csr', 'crt']) | list }}
  no_log: true

- name: generate per-node private keys and CSRs with routable SANs
  when: kafka_security == 'scram'
  run_once: true
  become: false
  delegate_to: localhost
  command:
    argv:
      - openssl
      - req
      - -new
      - -newkey
      - rsa:2048
      - -nodes
      - -subj
      - /CN=pigsty-controller
      - -addext
      - "subjectAltName={{ hostvars[item].kafka_tls_sans_internal | join(',') }}"
      - -keyout
      - "{{ kafka_certificate_workspace_internal }}/{{ item | regex_replace('[^A-Za-z0-9_.-]', '_') }}.key"
      - -out
      - "{{ kafka_certificate_workspace_internal }}/{{ item | regex_replace('[^A-Za-z0-9_.-]', '_') }}.csr"
  args:
    creates: "{{ kafka_certificate_workspace_internal }}/{{ item | regex_replace('[^A-Za-z0-9_.-]', '_') }}.key"
  loop: "{{ kafka_cluster_members }}"
  no_log: true

- name: sign per-node certificates with the Pigsty CA
  when: kafka_security == 'scram'
  run_once: true
  become: false
  delegate_to: localhost
  command:
    argv:
      - openssl
      - x509
      - -req
      - -in
      - "{{ kafka_certificate_workspace_internal }}/{{ item | regex_replace('[^A-Za-z0-9_.-]', '_') }}.csr"
      - -CA
      - "{{ role_path }}/../../files/pki/ca/ca.crt"
      - -CAkey
      - "{{ role_path }}/../../files/pki/ca/ca.key"
      - -CAcreateserial
      - -days
      - '825'
      - -sha256
      - -copy_extensions
      - copy
      - -out
      - "{{ kafka_certificate_workspace_internal }}/{{ item | regex_replace('[^A-Za-z0-9_.-]', '_') }}.crt"
  args:
    creates: "{{ kafka_certificate_workspace_internal }}/{{ item | regex_replace('[^A-Za-z0-9_.-]', '_') }}.crt"
  loop: "{{ kafka_cluster_members }}"
  no_log: true

- name: enforce private modes on controller-side certificate material
  when:
    - kafka_security == 'scram'
    - not ansible_check_mode
  run_once: true
  become: false
  delegate_to: localhost
  file:
    path: "{{ kafka_certificate_workspace_internal }}/{{ item.0 | regex_replace('[^A-Za-z0-9_.-]', '_') }}.{{ item.1 }}"
    mode: "{{ '0644' if item.1 == 'crt' else '0600' }}"
  loop: "{{ kafka_cluster_members | product(['key', 'csr', 'crt']) | list }}"
  no_log: true

- name: verify each generated node certificate against the Pigsty CA
  when:
    - kafka_security == 'scram'
    - not ansible_check_mode
  run_once: true
  become: false
  delegate_to: localhost
  command:
    argv:
      - openssl
      - verify
      - -CAfile
      - "{{ role_path }}/../../files/pki/ca/ca.crt"
      - "{{ kafka_certificate_workspace_internal }}/{{ item | regex_replace('[^A-Za-z0-9_.-]', '_') }}.crt"
  loop: "{{ kafka_cluster_members }}"
  changed_when: false
  no_log: true

- name: promote verified certificate rotation material
  when:
    - kafka_security == 'scram'
    - kafka_rotate_certificates | default(false) | bool
    - not ansible_check_mode
  run_once: true
  become: false
  delegate_to: localhost
  copy:
    src: >-
      {{ kafka_certificate_workspace_internal }}/{{ item.0 |
         regex_replace('[^A-Za-z0-9_.-]', '_') }}.{{ item.1 }}
    dest: >-
      {{ kafka_manifest_dir_internal }}/pki/{{ item.0 |
         regex_replace('[^A-Za-z0-9_.-]', '_') }}.{{ item.1 }}
    remote_src: true
    mode: "{{ '0644' if item.1 == 'crt' else '0600' }}"
  loop: "{{ kafka_cluster_members | product(['key', 'csr', 'crt']) | list }}"
  no_log: true

- name: remove promoted certificate rotation staging workspace
  when:
    - kafka_security == 'scram'
    - kafka_rotate_certificates | default(false) | bool
    - not ansible_check_mode
  run_once: true
  become: false
  delegate_to: localhost
  file:
    path: "{{ kafka_certificate_workspace_internal }}"
    state: absent

- name: create node-local Kafka PKI directory
  when: kafka_security == 'scram'
  file:
    path: /etc/kafka/pki
    state: directory
    owner: kafka
    group: kafka
    mode: '0700'

- name: install node certificate, key, and CA certificate
  when:
    - kafka_security == 'scram'
    - not ansible_check_mode or kafka_secret_stat_internal.stat.exists
  copy:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    owner: kafka
    group: kafka
    mode: "{{ item.mode }}"
  loop:
    - src: "{{ kafka_manifest_dir_internal }}/pki/{{ inventory_hostname | regex_replace('[^A-Za-z0-9_.-]', '_') }}.key"
      dest: /etc/kafka/pki/kafka.key
      mode: '0600'
    - src: "{{ kafka_manifest_dir_internal }}/pki/{{ inventory_hostname | regex_replace('[^A-Za-z0-9_.-]', '_') }}.crt"
      dest: /etc/kafka/pki/kafka.crt
      mode: '0644'
    - src: "{{ role_path }}/../../files/pki/ca/ca.crt"
      dest: /etc/kafka/pki/ca.crt
      mode: '0644'
  register: kafka_pki_copy_internal

- name: inspect node keystore and truststore
  when: kafka_security == 'scram'
  stat:
    path: "{{ item }}"
  loop:
    - /etc/kafka/pki/kafka.p12
    - /etc/kafka/pki/truststore.p12
  register: kafka_store_stat_internal

- name: reset truststore only when the trusted CA changed
  when:
    - kafka_security == 'scram'
    - kafka_pki_copy_internal.results | default([]) | length > 2
    - kafka_pki_copy_internal.results[2].changed | default(false)
  file:
    path: /etc/kafka/pki/truststore.p12
    state: absent
  register: kafka_truststore_reset_internal

- name: build node PKCS12 keystore
  when:
    - kafka_security == 'scram'
    - kafka_pki_copy_internal.changed or not kafka_store_stat_internal.results[0].stat.exists
    - not ansible_check_mode
  become_user: kafka
  no_log: true
  command:
    argv:
      - openssl
      - pkcs12
      - -export
      - -name
      - kafka
      - -in
      - /etc/kafka/pki/kafka.crt
      - -inkey
      - /etc/kafka/pki/kafka.key
      - -certfile
      - /etc/kafka/pki/ca.crt
      - -out
      - /etc/kafka/pki/kafka.p12
      - -passout
      - "pass:{{ kafka_keystore_password_internal }}"
  register: kafka_keystore_result_internal

- name: build node PKCS12 truststore
  when:
    - kafka_security == 'scram'
    - kafka_truststore_reset_internal.changed | default(false) or not kafka_store_stat_internal.results[1].stat.exists
    - not ansible_check_mode
  become_user: kafka
  no_log: true
  command:
    argv:
      - keytool
      - -importcert
      - -noprompt
      - -alias
      - pigsty-ca
      - -file
      - /etc/kafka/pki/ca.crt
      - -keystore
      - /etc/kafka/pki/truststore.p12
      - -storetype
      - PKCS12
      - -storepass
      - "{{ kafka_truststore_password_internal }}"
  register: kafka_truststore_result_internal

- name: require each node clock to accept its installed certificate
  when:
    - kafka_security == 'scram'
    - not ansible_check_mode
  command:
    argv:
      - openssl
      - verify
      - -CAfile
      - /etc/kafka/pki/ca.crt
      - /etc/kafka/pki/kafka.crt
  register: kafka_node_certificate_verify_internal
  changed_when: false
  retries: 30
  delay: 2
  until: kafka_node_certificate_verify_internal.rc == 0

- name: remove secure PKI files in plaintext mode
  when: kafka_security == 'plaintext'
  file:
    path: /etc/kafka/pki
    state: absent
  register: kafka_plaintext_pki_absent_internal

- name: render role-owned Kafka admin channels
  no_log: "{{ kafka_security == 'scram' }}"
  block:
    - template:
        src: admin.properties.j2
        dest: /etc/kafka/admin.properties
        owner: kafka
        group: kafka
        mode: '0600'
      register: kafka_admin_properties_result_internal
    - template:
        src: controller.properties.j2
        dest: /etc/kafka/controller.properties
        owner: kafka
        group: kafka
        mode: '0600'
      register: kafka_controller_properties_result_internal

- name: derive SCRAM records for initial metadata bootstrap
  no_log: true
  set_fact:
    kafka_storage_scram_args_internal: >-
      {{ ['--add-scram', 'SCRAM-SHA-512=[name=' ~ kafka_admin_principal_internal ~ ',password=' ~ kafka_admin_password_internal ~ ']',
          '--add-scram', 'SCRAM-SHA-512=[name=' ~ kafka_monitor_principal_internal ~ ',password=' ~ kafka_monitor_password_internal ~ ']',
          '--add-scram', 'SCRAM-SHA-512=[name=' ~ kafka_broker_principal_internal ~ ',password=' ~ kafka_broker_password_internal ~ ']',
          '--add-scram', 'SCRAM-SHA-512=[name=' ~ kafka_broker_standby_principal_internal ~ ',password=' ~ kafka_broker_standby_password_internal ~ ']']
         if kafka_security == 'scram' else [] }}
    kafka_security_changed_internal: >-
      {{ kafka_pki_copy_internal.changed | default(false) or
         kafka_keystore_result_internal.changed | default(false) or
         kafka_truststore_result_internal.changed | default(false) or
         kafka_plaintext_pki_absent_internal.changed | default(false) or
         kafka_admin_properties_result_internal.changed | default(false) or
         kafka_controller_properties_result_internal.changed | default(false) or
         kafka_credentials_rotated_internal | default(false) }}
