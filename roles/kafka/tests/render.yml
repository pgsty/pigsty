---
- name: render default single combined topology
  hosts: kafka_single
  connection: local
  gather_facts: false
  vars:
    ansible_limit: kafka_single
  pre_tasks:
    - set_fact: { _kafka_role_was_explicit: false }
  roles:
    - role: kafka
      kafka_phase: identity
  post_tasks:
    - name: provide frozen bootstrap facts for in-memory rendering
      set_fact:
        kafka_manifest_internal:
          schema: 1
          cluster_id: AAAAAAAAAAAAAAAAAAAAAA
          security: plaintext
          initial_controllers: [{node_id: 1, directory_id: BBBBBBBBBBBBBBBBBBBBBB}]
          replication_factor: 1
          min_insync_replicas: 1
    - name: render templates in memory
      set_fact:
        kafka_rendered_config: "{{ lookup('template', playbook_dir + '/../templates/server.properties.j2') }}"
        kafka_rendered_env: "{{ lookup('template', playbook_dir + '/../templates/kafka.env.j2') }}"
        kafka_rendered_jmx: "{{ lookup('template', playbook_dir + '/../templates/jmx_exporter.yml.j2') }}"
        kafka_rendered_exporter: "{{ lookup('template', playbook_dir + '/../templates/kafka_exporter.env.j2') }}"
    - name: assert default combined and dynamic quorum contract
      assert:
        that:
          - kafka_role == 'combined'
          - kafka_process_roles == 'broker,controller'
          - kafka_controller_bootstrap_internal == '10.90.0.10:9095'
          - "'controller.quorum.bootstrap.servers=10.90.0.10:9095' in kafka_rendered_config"
          - "'controller.quorum.voters' not in kafka_rendered_config"
          - "'listeners=BROKER://0.0.0.0:9092,CONTROLLER://0.0.0.0:9095' in kafka_rendered_config"
          - "'advertised.listeners=BROKER://10.90.0.10:9092' in kafka_rendered_config"
          - "'advertised.listeners=BROKER://10.90.0.10:9092,CONTROLLER' not in kafka_rendered_config"
          - "'BROKER:PLAINTEXT,CONTROLLER:PLAINTEXT' in kafka_rendered_config"
          - "'kafka_server_replica_manager_under_replicated_partitions' in kafka_rendered_jmx"
          - "'--kafka.version=4.0.0' in kafka_rendered_exporter"

- name: render all three explicit native roles
  hosts: kafka_three
  connection: local
  gather_facts: false
  vars:
    ansible_limit: kafka_three
  pre_tasks:
    - set_fact: { _kafka_role_was_explicit: true }
  roles:
    - role: kafka
      kafka_phase: identity
  post_tasks:
    - set_fact:
        kafka_manifest_internal:
          schema: 1
          cluster_id: CCCCCCCCCCCCCCCCCCCCCC
          security: plaintext
          initial_controllers:
            - {node_id: 1, directory_id: DDDDDDDDDDDDDDDDDDDDDD}
            - {node_id: 2, directory_id: EEEEEEEEEEEEEEEEEEEEEE}
          replication_factor: 1
          min_insync_replicas: 1
    - set_fact:
        kafka_rendered_config: "{{ lookup('template', playbook_dir + '/../templates/server.properties.j2') }}"
    - name: assert common dynamic quorum contract
      assert:
        that:
          - kafka_controller_bootstrap_internal == '10.90.0.11:9095,10.90.0.12:9095'
          - "'controller.quorum.bootstrap.servers=' ~ kafka_controller_bootstrap_internal in kafka_rendered_config"
          - "'controller.quorum.voters' not in kafka_rendered_config"
    - name: assert controller listener contract
      when: kafka_role == 'controller'
      assert:
        that:
          - "'process.roles=controller' in kafka_rendered_config"
          - "'listeners=CONTROLLER://0.0.0.0:9095' in kafka_rendered_config"
          - "'advertised.listeners' not in kafka_rendered_config"
          - "'BROKER://0.0.0.0' not in kafka_rendered_config"
    - name: assert combined listener contract
      when: kafka_role == 'combined'
      assert:
        that:
          - "'process.roles=broker,controller' in kafka_rendered_config"
          - "'listeners=BROKER://0.0.0.0:9092,CONTROLLER://0.0.0.0:9095' in kafka_rendered_config"
          - "'advertised.listeners=BROKER://10.90.0.12:9092' in kafka_rendered_config"
          - "'default.replication.factor=1' in kafka_rendered_config"
    - name: assert broker listener contract
      when: kafka_role == 'broker'
      assert:
        that:
          - "'process.roles=broker' in kafka_rendered_config"
          - "'listeners=BROKER://0.0.0.0:9092' in kafka_rendered_config"
          - "'CONTROLLER://0.0.0.0:9095' not in kafka_rendered_config"
          - "'default.replication.factor=1' in kafka_rendered_config"

- name: render three-controller three-broker split topology
  hosts: kafka_split
  connection: local
  gather_facts: false
  vars:
    ansible_limit: kafka_split
  pre_tasks:
    - set_fact: { _kafka_role_was_explicit: true }
  roles:
    - role: kafka
      kafka_phase: identity
  post_tasks:
    - set_fact:
        kafka_manifest_internal:
          schema: 1
          cluster_id: FFFFFFFFFFFFFFFFFFFFFF
          security: plaintext
          initial_controllers:
            - {node_id: 1, directory_id: GGGGGGGGGGGGGGGGGGGGGG}
            - {node_id: 2, directory_id: HHHHHHHHHHHHHHHHHHHHHH}
            - {node_id: 3, directory_id: IIIIIIIIIIIIIIIIIIIIII}
          replication_factor: 3
          min_insync_replicas: 2
    - set_fact:
        kafka_rendered_config: "{{ lookup('template', playbook_dir + '/../templates/server.properties.j2') }}"
    - name: assert six-node split topology and derived exporter placement
      assert:
        that:
          - kafka_controller_nodes | length == 3
          - kafka_broker_nodes | length == 3
          - kafka_controller_bootstrap_internal == '10.90.0.31:9095,10.90.0.32:9095,10.90.0.33:9095'
          - kafka_exporter_hosts_internal == ['10.90.0.34', '10.90.0.35']
          - "'controller.quorum.voters' not in kafka_rendered_config"
    - name: assert pure controller rendering
      when: kafka_role == 'controller'
      assert:
        that:
          - "'process.roles=controller' in kafka_rendered_config"
          - "'listeners=CONTROLLER://0.0.0.0:9095' in kafka_rendered_config"
          - "'advertised.listeners' not in kafka_rendered_config"
          - "'inter.broker.listener.name' not in kafka_rendered_config"
          - inventory_hostname not in kafka_exporter_hosts_internal
    - name: assert pure broker rendering
      when: kafka_role == 'broker'
      assert:
        that:
          - "'process.roles=broker' in kafka_rendered_config"
          - "'listeners=BROKER://0.0.0.0:9092' in kafka_rendered_config"
          - "'advertised.listeners=BROKER://' ~ inventory_hostname ~ ':9092' in kafka_rendered_config"
          - "'CONTROLLER://0.0.0.0' not in kafka_rendered_config"

- name: render the production SCRAM security profile
  hosts: kafka_scram
  connection: local
  gather_facts: false
  vars:
    ansible_limit: kafka_scram
  pre_tasks:
    - set_fact: { _kafka_role_was_explicit: false }
  roles:
    - role: kafka
      kafka_phase: identity
  post_tasks:
    - name: provide protected security facts for in-memory rendering
      no_log: true
      set_fact:
        kafka_manifest_internal:
          schema: 1
          cluster_id: JJJJJJJJJJJJJJJJJJJJJJ
          security: scram
          initial_controllers: [{node_id: 1, directory_id: KKKKKKKKKKKKKKKKKKKKKK}]
          replication_factor: 1
          min_insync_replicas: 1
        kafka_admin_principal_internal: pigsty-admin
        kafka_admin_password_internal: test-admin-password
        kafka_monitor_principal_internal: pigsty-monitor
        kafka_monitor_password_internal: test-monitor-password
        kafka_broker_principal_internal: pigsty-broker-a
        kafka_broker_password_internal: test-broker-a-password
        kafka_broker_standby_principal_internal: pigsty-broker-b
        kafka_broker_standby_password_internal: test-broker-b-password
        kafka_keystore_password_internal: test-keystore-password
        kafka_truststore_password_internal: test-truststore-password
    - name: render secure templates in memory
      no_log: true
      set_fact:
        kafka_rendered_config: "{{ lookup('template', playbook_dir + '/../templates/server.properties.j2') }}"
        kafka_rendered_admin: "{{ lookup('template', playbook_dir + '/../templates/admin.properties.j2') }}"
        kafka_rendered_controller: "{{ lookup('template', playbook_dir + '/../templates/controller.properties.j2') }}"
        kafka_rendered_exporter: "{{ lookup('template', playbook_dir + '/../templates/kafka_exporter.env.j2') }}"
    - name: assert composed TLS SCRAM authorizer profile
      assert:
        that:
          - "'BROKER:SASL_SSL,CONTROLLER:SSL' in kafka_rendered_config"
          - "'listener.name.controller.ssl.client.auth=required' in kafka_rendered_config"
          - "'sasl.mechanism.inter.broker.protocol=SCRAM-SHA-512' in kafka_rendered_config"
          - "'authorizer.class.name=org.apache.kafka.metadata.authorizer.StandardAuthorizer' in kafka_rendered_config"
          - "'allow.everyone.if.no.acl.found=false' in kafka_rendered_config"
          - "'security.protocol=SASL_SSL' in kafka_rendered_admin"
          - "'security.protocol=SSL' in kafka_rendered_controller"
          - "'--sasl.enabled' in kafka_rendered_exporter"
          - "'--sasl.mechanism=scram-sha512' in kafka_rendered_exporter"
          - "'--tls.enabled' in kafka_rendered_exporter"

- name: reject partially explicit role declarations
  hosts: kafka_partial_role
  connection: local
  gather_facts: false
  vars:
    ansible_limit: kafka_partial_role
  pre_tasks:
    - set_fact:
        _kafka_role_was_explicit: "{{ kafka_role is defined }}"
  tasks:
    - block:
        - include_role:
            name: kafka
          vars:
            kafka_phase: identity
        - fail:
            msg: partially explicit roles were incorrectly accepted
      rescue:
        - set_fact: { kafka_partial_role_rejected: true }
    - assert:
        that: kafka_partial_role_rejected | default(false) | bool

