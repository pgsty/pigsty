---
# Internal removal contract: local state is preserved without public knobs.
mysql_service: "{{ 'mysqld' if os_package == 'rpm' else 'mysql' }}"
mysql_group: mysql
mysql_router_service: mysqlrouter
mysql_exporter_service: mysqld_exporter
mysql_backup_timer: mysql-backup.timer
mysql_backup_service: mysql-backup.service
mysql_cluster_username: dbuser_cluster
mysql_shell_binary: /usr/bin/mysqlsh
mysql_secret_dir: /etc/mysql/pigsty
mysql_root_config: "{{ mysql_secret_dir }}/root.cnf"
mysql_cluster_password_file: /etc/mysql/pigsty/cluster-password
mysql_tls_ca: /etc/pki/ca.crt
mysql_remove_script: /etc/mysql/pigsty/remove-member.js
mysql_data: /var/lib/mysql
mysql_initialized_marker: /var/lib/mysql/.pigsty-mysql-initialized
mysql_retired_marker: /var/lib/mysql/.pigsty-mysql-retired
...
