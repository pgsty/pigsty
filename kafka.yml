#!/usr/bin/env ansible-playbook
---
#==============================================================#
# File      :   kafka.yml
# Desc      :   Deploy production Kafka 4.x with dynamic KRaft
# Ctime     :   2024-01-01
# Mtime     :   2026-07-16
